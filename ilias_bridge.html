<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernmodul - Pohlscher Resonator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 16px rgba(21, 50, 104, 0.12);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-bar svg {
            flex-shrink: 0;
        }

        .logo-bar span {
            font-size: 13px;
            color: rgb(21, 50, 104);
            font-weight: 600;
            text-align: left;
            line-height: 1.3;
        }

        h1 {
            font-size: 20px;
            color: rgb(21, 50, 104);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: rgb(100, 100, 100);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgb(59, 59, 58);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d5dd;
            border-radius: 6px;
            font-size: 15px;
            color: rgb(21, 50, 104);
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: rgb(21, 50, 104);
        }

        input[type="text"].error {
            border-color: #d93025;
        }

        .btn {
            width: 100%;
            padding: 11px;
            background: rgb(21, 50, 104);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn:hover:not(:disabled) {
            background: rgb(30, 68, 140);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Status messages */
        .status {
            margin-top: 20px;
            font-size: 13px;
            min-height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status.info    { color: rgb(21, 50, 104); }
        .status.success { color: #1a7340; }
        .status.error   { color: #d93025; }
        .status.hidden  { visibility: hidden; }

        /* Spinner (inline) */
        .spinner {
            border: 2px solid rgba(21, 50, 104, 0.2);
            border-left-color: rgb(21, 50, 104);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Inline user-existence feedback between fields and button */
        .user-check-result {
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.4;
            min-height: 55px;  /* reserves space before any content appears */
        }
        .user-check-result.known   { background: #e8f5e9; color: #1a7340; }
        .user-check-result.new     { background: #e8f0fb; color: rgb(21, 50, 104); }
        .user-check-result.error   { background: #fdecea; color: #d93025; }
        .user-check-result.hidden  { visibility: hidden; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-bar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="44" height="44">
                <circle cx="50" cy="50" r="43" fill="none" stroke="rgb(80, 165, 210)" stroke-width="12"/>
                <circle cx="50" cy="50" r="30" fill="none" stroke="rgb(21,50,104)" stroke-width="10"/>
                <circle cx="50" cy="50" r="7"  fill="none" stroke="rgb(21,50,104)" stroke-width="7"/>
                <line x1="76" y1="35" x2="50" y2="50" stroke="rgb(21,50,104)" stroke-width="10"/>
                <line x1="24" y1="35" x2="50" y2="50" stroke="rgb(21,50,104)" stroke-width="10"/>
                <line x1="50" y1="50" x2="50" y2="80" stroke="rgb(21,50,104)" stroke-width="10"/>
            </svg>
            <span>Lernmodul<br>Pohlscher Resonator</span>
        </div>

        <h1>Willkommen</h1>
        <p class="subtitle">
            Bitte geben Sie Ihren Benutzernamen<br>und den Kursschlüssel ein.
        </p>

        <div class="form-group">
            <label for="username">Benutzername</label>
            <input
                type="text"
                id="username"
                placeholder="z. B. max.mustermann"
                autocomplete="off"
                autocapitalize="none"
                spellcheck="false"
            />
        </div>

        <div class="form-group">
            <label for="key">Kursschlüssel</label>
            <input
                type="password"
                id="key"
                placeholder="Schlüssel eingeben"
                autocomplete="off"
            />
        </div>

        <div class="user-check-result hidden" id="user-check-result"></div>

        <button class="btn" id="submit-btn" onclick="handleSubmit()" disabled>Weiter</button>

        <div class="status hidden" id="status">
            <div class="spinner" id="spinner" style="display:none"></div>
            <span id="status-text"></span>
        </div>
    </div>

    <script>
        // ── Configuration ─────────────────────────────────────────────────────────
        // API is always relative — the bridge is served from the same server as the API.
        const API_BASE = '/api';
        // In local dev the bridge runs on :3000 (Express) and Angular on :4200.
        // In production both live on the same origin, so '/' is correct.
        const MODULE_URL = window.location.port === '3000' ? 'http://localhost:4200' : '/';
        // ─────────────────────────────────────────────────────────────────────────

        const usernameInput   = document.getElementById('username');
        const keyInput        = document.getElementById('key');
        const submitBtn       = document.getElementById('submit-btn');
        const statusEl        = document.getElementById('status');
        const spinnerEl       = document.getElementById('spinner');
        const statusTxt       = document.getElementById('status-text');
        const userCheckResult = document.getElementById('user-check-result');

        let userExists = null; // set after a successful check

        // Reset check state whenever either field is edited after a check.
        [usernameInput, keyInput].forEach(el => {
            el.addEventListener('input', () => {
                el.classList.remove('error');
                userExists = null;
                submitBtn.disabled = true;
                userCheckResult.className = 'user-check-result hidden';
            });
            el.addEventListener('blur', tryCheck);
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryCheck(); });
        });

        function setStatus(type, text, showSpinner = false) {
            statusEl.className = `status ${type}`;
            statusTxt.textContent = text;
            spinnerEl.style.display = showSpinner ? 'block' : 'none';
        }

        function showCheckResult(type, text) {
            userCheckResult.className = `user-check-result ${type}`;
            userCheckResult.textContent = text;
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Fires on blur — runs the check only when both fields are non-empty.
        async function tryCheck() {
            const username = usernameInput.value.trim();
            const key      = keyInput.value.trim();
            if (!username || !key || userExists !== null) return;

            setStatus('info', 'Wird überprüft…', true);

            try {
                const checkRes = await fetch(`${API_BASE}/users/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, key }),
                });

                setStatus('hidden', '');

                if (checkRes.status === 401) {
                    keyInput.classList.add('error');
                    showCheckResult('error', 'Kursschlüssel ungültig.');
                    return;
                }
                if (!checkRes.ok) throw new Error(`check failed: ${checkRes.status}`);

                const data = await checkRes.json();
                userExists = data.exists;

                if (userExists) {
                    showCheckResult('known', `Bekannter Benutzer – Ihr Fortschritt wird geladen.`);
                } else {
                    showCheckResult('new', `Neuer Benutzer – Sie werden beim Betreten angelegt.`);
                }

                submitBtn.disabled = false;

            } catch (err) {
                console.error('Check error:', err);
                setStatus('error', 'Verbindung zum Server fehlgeschlagen.');
            }
        }

        // "Weiter" only runs after the check has already passed.
        async function handleSubmit() {
            const username = usernameInput.value.trim();

            submitBtn.disabled = true;
            setStatus('info', userExists ? 'Willkommen zurück! Fortschritt wird geladen…' : 'Neuer Benutzer wird angelegt…', true);

            try {
                if (!userExists) {
                    const createRes = await fetch(`${API_BASE}/users/create`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username }),
                    });
                    if (!createRes.ok) throw new Error(`create failed: ${createRes.status}`);
                }

                await delay(1500);
                window.location.href = `${MODULE_URL}?session_id=${encodeURIComponent(username)}`;

            } catch (err) {
                console.error('Submit error:', err);
                setStatus('error', 'Verbindung zum Server fehlgeschlagen. Bitte versuchen Sie es erneut.');
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
