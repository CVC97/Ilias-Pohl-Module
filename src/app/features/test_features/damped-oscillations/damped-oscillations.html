<div class="container">
    <div class="card">
        <h1 class="h1-test">
            <span *ngIf="currentView === 'damped_osc1'">Test: Gedämpfte Schwingungen (1/5)</span>
            <span *ngIf="currentView === 'damped_osc2'">Test: Gedämpfte Schwingungen (2/5)</span>
            <span *ngIf="currentView === 'damped_osc3'">Test: Gedämpfte Schwingungen (3/5)</span>
            <span *ngIf="currentView === 'damped_osc4'">Test: Gedämpfte Schwingungen (4/5)</span>
            <span *ngIf="currentView === 'damped_osc5'">Test: Gedämpfte Schwingungen (5/5)</span>
            <span *ngIf="currentView === 'damped_osc6'">Test: Gedämpfte Schwingungen - Ergebnis</span>
        </h1>

        <!-- page 1 -->
        <div *ngIf="currentView === 'damped_osc1'">
            <app-test-order-images
                [questionId]="question1.questionId"
                [question]="question1.question"
                [questionInstruction]="question1.questionInstruction"
                [images]="question1.images"
                [correctOrder]="question1.correctOrder"
                [maxPoints]="question1.maxPoints"
                [containerId]="question1.containerId"
                (onSubmit)="onQuestion1Submit($event)">
            </app-test-order-images>
        </div>

        <!-- page 2 -->
        <div *ngIf="currentView === 'damped_osc2'">
            <app-test-order-images
                [questionId]="question2.questionId"
                [question]="question2.question"
                [questionInstruction]="question2.questionInstruction"
                [images]="question2.images"
                [correctOrder]="question2.correctOrder"
                [maxPoints]="question2.maxPoints"
                [containerId]="question2.containerId"
                (onSubmit)="onQuestion2Submit($event)">
            </app-test-order-images>
        </div>

        <!-- page 3 -->
        <div *ngIf="currentView === 'damped_osc3'">
            <app-test-single-choice
                [questionId]="question3.questionId"
                [question]="question3.question"
                [questionInstruction]="question3.questionInstruction"
                [options]="question3.options"
                [correctAnswer]="question3.correctAnswer"
                [maxPoints]="question3.maxPoints"
                [containerId]="question3.containerId"
                (onSubmit)="onQuestion3Submit($event)">
            </app-test-single-choice>
        </div>

        <!-- page 4 -->
        <div *ngIf="currentView === 'damped_osc4'">
            <app-test-multiple-choice
                [questionId]="question4.questionId"
                [question]="question4.question"
                [questionInstruction]="question4.questionInstruction"
                [options]="question4.options"
                [correctAnswers]="question4.correctAnswers"
                [maxPoints]="question4.maxPoints"
                [pointsPerCorrectClick]="question4.pointsPerCorrectClick"
                [containerId]="question4.containerId"
                (onSubmit)="onQuestion4Submit($event)">
            </app-test-multiple-choice>
        </div>

        <!-- page 5 -->
        <div *ngIf="currentView === 'damped_osc5'">
            <app-test-drag-and-drop
                [questionId]="question5.questionId"
                [question]="question5.question"
                [questionInstruction]="question5.questionInstruction"
                [containers]="question5.containers"
                [answers]="question5.answers"
                [maxPoints]="question5.maxPoints"
                [containerId]="question5.containerId"
                (onSubmit)="onQuestion5Submit($event)">
            </app-test-drag-and-drop>
        </div>

        <!-- page 6: test results -->
        <div *ngIf="currentView === 'damped_osc6'">
            <app-end-page
                [testId]="'damped-oscillations'"
                [testTitle]="'Gedämpfte Schwingungen'"
                [thresholds]="performanceThresholds"
                (resultsCalculated)="onResultsCalculated($event)">
            </app-end-page>
        </div>

    <!-- forward button - bottom right, conditionally enabled -->
    <div class="button-container" [class]="getPerformanceClass()">
        <!-- first page: go back to intro-experiment -->
        <button *ngIf="isFirstPage" routerLink="/learning/intro-experiment" class="btn" [disabled]="!canGoBack">← Zurück zum Versuchsaufbau</button>
        <!-- otherwise: go back -->
        <button *ngIf="!isFirstPage" class="btn" (click)="goBack()" [disabled]="!canGoBack">← Zurück</button>
        <!-- unless last test-question or end-page: weiter -->
        <button *ngIf="!isEndPage" class="btn" (click)="goForward()" [disabled]="!canProceed">Weiter →</button>
        <!-- last test question: Test beenden -->
        <button *ngIf="currentView === 'damped_osc5'" class="btn" (click)="goForward()" [disabled]="!canProceed">Test beenden → </button>
        <button *ngIf="currentView === 'damped_osc6'" class="btn" (click)="goForward()" [disabled]="!canProceed">{{ continueLinkText }} →</button>
    </div>
</div>
